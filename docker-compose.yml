services:
  crm-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: crm_db
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: crm_pass
    volumes:
      - crm_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      CI_ENVIRONMENT: development
    ports:
      - "8080:8080"
    volumes:
      - ./writable:/app/writable
    depends_on:
      crm-db:
        condition: service_healthy
    command: >
      sh -c "php spark migrate --all -n && php spark serve --host 0.0.0.0 --port 8080"

volumes:
  crm_data:
